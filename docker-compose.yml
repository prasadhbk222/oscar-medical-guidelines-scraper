services:
  postgres:
    image: postgres:16
    container_name: oscar_postgres
    environment:
      POSTGRES_USER: oscar
      POSTGRES_PASSWORD: oscar
      POSTGRES_DB: oscar
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oscar"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgweb:
    image: sosedoff/pgweb:latest
    container_name: oscar_pgweb
    ports:
      - "8081:8081"
    environment:
      PGWEB_DATABASE_URL: postgres://oscar:oscar@postgres:5432/oscar?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
